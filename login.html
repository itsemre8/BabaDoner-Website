<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inloggen – Baba Döner Beheer</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .error-msg {
      display:none;
      background:#f8d7da;
      border:2px solid #f5c2c7;
      border-radius:var(--radius-sm);
      padding:1rem;
      color:#842029;
      font-size:.9rem;
      margin-bottom:1rem;
      text-align:center;
    }
    .login-divider {
      display:flex; align-items:center; gap:1rem;
      margin:1.5rem 0;
      color:#6b5449; font-size:.85rem;
    }
    .login-divider::before, .login-divider::after {
      content:''; flex:1; height:1px; background:var(--zand);
    }
    .password-toggle {
      position:relative;
    }
    .password-toggle input { padding-right:3rem; }
    .password-toggle .toggle-btn {
      position:absolute; right:.75rem; top:50%; transform:translateY(-50%);
      background:none; color:#6b5449; font-size:1rem; cursor:pointer;
    }
  </style>
</head>
<body>

  <div class="login-page">
    <div class="login-left">
      <div class="login-card">
        <div class="login-card__logo">Baba<span>Döner</span></div>
        <p class="login-card__sub">Beheerpaneel Aanmelden</p>

        <div class="error-msg" id="loginError">
          ❌ Ongeldig e-mailadres of wachtwoord. Probeer opnieuw.
        </div>

        <form id="loginForm">
          <div class="form-group">
            <label for="login-email">E-mailadres</label>
            <input type="email" id="login-email" class="form-control" placeholder="beheer@babadoner.nl" required>
          </div>

          <div class="form-group">
            <label for="login-ww">Wachtwoord</label>
            <div class="password-toggle">
              <input type="password" id="login-ww" class="form-control" placeholder="••••••••" required>
              <button type="button" class="toggle-btn" id="togglePw" title="Toon wachtwoord">👁</button>
            </div>
          </div>

          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
            <label style="display:flex; align-items:center; gap:.5rem; font-size:.85rem; color:#6b5449; cursor:pointer;">
              <input type="checkbox" style="accent-color:var(--turkoois);">
              Onthoud mij
            </label>
            <a href="#" style="font-size:.85rem; color:var(--turkoois);">Wachtwoord vergeten?</a>
          </div>

          <button type="submit" class="btn btn--primary" style="width:100%; justify-content:center;">
            Inloggen →
          </button>
        </form>

        <div class="login-divider">of</div>
        <a href="../index.html" class="btn btn--outline" style="width:100%; justify-content:center; color:var(--bruin); border-color:var(--zand);">
          ← Terug naar Website
        </a>

        <p style="text-align:center; font-size:.78rem; color:#9a8070; margin-top:1.5rem;">
          Geen toegang? Neem contact op met de beheerder.<br>
          &copy; 2024 DönerKoning
        </p>
      </div>
    </div>

    <div class="login-right">
      <div>
        <h2>Baba<span style="color:var(--terracotta);">Döner</span></h2>
        <p>Welkom in het beheerpaneel. Beheer uw menu, reserveringen en berichten op één plek.</p>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('login-email').value;
      const pw = document.getElementById('login-ww').value;
      // Demo: admin@donerkoning.nl / admin123
      if (email === 'admin@donerkoning.nl' && pw === 'admin123') {
        window.location.href = 'admin-dashboard.html';
      } else {
        document.getElementById('loginError').style.display = 'block';
      }
    });

    document.getElementById('togglePw').addEventListener('click', function() {
      const input = document.getElementById('login-ww');
      input.type = input.type === 'password' ? 'text' : 'password';
      this.textContent = input.type === 'password' ? '👁' : '🙈';
    });
  </script>
</body>
</html>
